server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name jaoh.42.fr;

    # TLS configuration - only TLSv1.2 and TLSv1.3
    ssl_certificate     /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Web root - shared volume with WordPress
    root /var/www/html;
    index index.php index.html;

    # Handle requests
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Pass PHP requests to WordPress container via php-fpm
    location ~ \.php$ {
        # Split path info for CGI
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Forward to wordpress container on port 9000
        fastcgi_pass wordpress:9000;
        fastcgi_index index.php;

        # FastCGI parameters
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
